<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACS Vacinas - Sistema de Imunização</title>
  <meta name="theme-color" content="#047857">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .nav-item { transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.15); }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .toast { animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes pulse-alert { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } }
    input, select, textarea { font-size: 14px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 9999px; font-weight: 600; }
    .badge-red { background: #fee2e2; color: #dc2626; }
    .badge-green { background: #dcfce7; color: #16a34a; }
    .badge-yellow { background: #fef9c3; color: #ca8a04; }
    .badge-blue { background: #dbeafe; color: #2563eb; }
    .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    .stat-card { border-left: 4px solid; }
    .patient-photo-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 9999px; border: 2px solid #d1fae5; cursor: pointer; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 10px; }
    .photo-tile { position: relative; aspect-ratio: 1 / 1; border-radius: 12px; overflow: hidden; background: #ecfdf5; border: 1px solid #d1fae5; }
    .photo-tile img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
    .photo-delete { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; border-radius: 9999px; display: flex; align-items: center; justify-content: center; background: rgba(220, 38, 38, 0.94); color: white; cursor: pointer; border: none; }
    .photo-delete:hover { background: rgba(220, 38, 38, 1); }
    .camera-input::file-selector-button { border: 0; border-radius: 8px; background: #047857; color: white; padding: 8px 12px; margin-right: 12px; font-weight: 600; cursor: pointer; }
    .camera-input::file-selector-button:hover { background: #065f46; }
    .nav-text { transition: all 0.2s; }
    body { box-sizing: border-box; }
    .preview-img-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; }
    .vaccine-photo-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid #ccc; }
  </style>
</head>
<body class="h-full bg-gray-50">
  <div id="app" class="h-full flex overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-gradient-to-b from-emerald-700 to-emerald-900 text-white flex flex-col shrink-0 transition-all duration-300 lg:relative fixed left-0 top-0 h-full z-40 -translate-x-full lg:translate-x-0">
      <div class="p-4 flex items-center gap-3 border-b border-emerald-600/50">
        <div class="w-9 h-9 bg-white/20 rounded-lg flex items-center justify-center"><i data-lucide="shield-check" class="w-5 h-5"></i></div>
        <div class="logo-text">
          <h1 id="sidebar-title" class="font-bold text-sm leading-tight">ACS Vacinas</h1>
          <p id="sidebar-ubs" class="text-emerald-200 text-xs">UBS Central</p>
        </div>
      </div>
      <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
        <button onclick="navigate('dashboard')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm" data-nav="dashboard"> <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i><span class="nav-text">Dashboard</span> </button>
        <button onclick="navigate('patients')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm" data-nav="patients"> <i data-lucide="users" class="w-4 h-4 shrink-0"></i><span class="nav-text">Pacientes</span> </button>
        <button onclick="navigate('register-vaccine')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm" data-nav="register-vaccine"> <i data-lucide="syringe" class="w-4 h-4 shrink-0"></i><span class="nav-text">Registrar Vacina</span> </button>
        <button onclick="navigate('vaccines')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm" data-nav="vaccines"> <i data-lucide="pill" class="w-4 h-4 shrink-0"></i><span class="nav-text">Cadastrar Vacina</span> </button>
        <button onclick="navigate('alerts')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm" data-nav="alerts"> <i data-lucide="bell" class="w-4 h-4 shrink-0"></i><span class="nav-text">Alertas</span> </button>
        <button onclick="navigate('reports')" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm" data-nav="reports"> <i data-lucide="file-text" class="w-4 h-4 shrink-0"></i><span class="nav-text">Relatórios</span> </button>
      </nav>
      <div class="p-3 border-t border-emerald-600/50">
        <div class="flex items-center gap-2 px-3 py-2">
          <div class="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center text-xs font-bold">ACS</div>
          <div class="nav-text">
            <p class="text-xs font-medium">Agente de Saúde</p>
            <p class="text-emerald-300 text-[10px]">Microárea 01</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto">
      <header class="bg-white border-b px-6 py-3 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center gap-3">
          <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 rounded-lg"> <i data-lucide="menu" class="w-5 h-5 text-gray-600"></i> </button>
          <h2 id="page-title" class="text-lg font-bold text-gray-800">Dashboard</h2>
        </div>
        <div class="flex items-center gap-2">
          <div class="relative hidden sm:block">
            <input type="text" id="global-search" placeholder="Buscar paciente..." class="pl-9 pr-4 py-2 bg-gray-100 rounded-lg text-sm w-48 focus:outline-none focus:ring-2 focus:ring-emerald-500">
            <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-3 top-2.5"></i>
          </div>
          <button onclick="exportLocalBackup()" class="flex text-xs text-gray-600 bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded-full items-center gap-1 transition">
            <i data-lucide="download" class="w-3 h-3"></i><span class="hidden sm:inline">Backup</span>
          </button>
          <span id="sync-status" class="text-xs text-emerald-600 bg-emerald-50 px-2 py-1 rounded-full flex items-center gap-1 max-w-[150px] overflow-hidden whitespace-nowrap"> 
            <i data-lucide="database" class="w-3 h-3 shrink-0"></i> Local 
          </span>
        </div>
      </header>
      <div id="page-content" class="p-6 fade-in"></div>
    </main>
  </div>

  <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/40 z-30 lg:hidden" onclick="closeSidebar()"></div>
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>
  <div id="modal-container" class="hidden fixed inset-0 z-50"></div>

  <script>
    // ==================== ESTADO GLOBAL ====================
    let allData = [];
    let currentPage = 'dashboard';
    const photoUrlCache = new Map();
    let currentEditingPatient = null;
    let currentEditingVaccine = null;
    let tempPatientPhotos = [];
    
    const defaultConfig = {
      app_title: 'ACS Vacinas',
      ubs_name: 'UBS Central',
      primary_color: '#047857',
      surface_color: '#ffffff',
      text_color: '#1f2937',
      action_color: '#059669',
      secondary_action_color: '#6b7280'
    };

    const LOCAL_DB_NAME = 'acs-vacinas-db';
    const LOCAL_DB_VERSION = 1;
    let localDb = null;
    let localDataHandler = null;

    // ==================== INDEXEDDB ====================
    function openLocalDb() {
      if (localDb) return Promise.resolve(localDb);
      return new Promise((resolve, reject) => {
        if (!('indexedDB' in window)) {
          reject(new Error('IndexedDB não está disponível neste navegador.'));
          return;
        }
        const request = indexedDB.open(LOCAL_DB_NAME, LOCAL_DB_VERSION);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains('records')) {
            const store = db.createObjectStore('records', { keyPath: '__backendId' });
            store.createIndex('type', 'type', { unique: false });
            store.createIndex('patient_id', 'patient_id', { unique: false });
            store.createIndex('created_at', 'created_at', { unique: false });
          }
        };
        request.onsuccess = () => {
          localDb = request.result;
          resolve(localDb);
        };
        request.onerror = () => reject(request.error);
      });
    }

    async function getAllLocalRecords() {
      const db = await openLocalDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('records', 'readonly');
        const request = tx.objectStore('records').getAll();
        request.onsuccess = () => resolve(request.result || []);
        request.onerror = () => reject(request.error);
      });
    }

    async function putLocalRecord(record) {
      const db = await openLocalDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('records', 'readwrite');
        tx.objectStore('records').put(record);
        tx.oncomplete = () => resolve(record);
        tx.onerror = () => reject(tx.error);
      });
    }

    async function deleteLocalRecord(id) {
      const db = await openLocalDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('records', 'readwrite');
        tx.objectStore('records').delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function makeLocalId() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return 'local-' + Date.now() + '-' + Math.random().toString(16).slice(2);
    }

    // ==================== FUNÇÕES DE FOTO ====================
    function normalizeRecordPhotos(record) {
      if (!record) return [];
      return Array.isArray(record.photos) ? record.photos.filter(photo => photo && photo.blob) : [];
    }

    function countRecordPhotos(record) {
      return normalizeRecordPhotos(record).length;
    }

    function getPhotoObjectUrl(ownerId, photo) {
      if (!photo || !photo.blob) return '';
      const key = `${ownerId || 'record'}:${photo.id || 'photo'}:${photo.size || 0}`;
      if (!photoUrlCache.has(key)) {
        photoUrlCache.set(key, URL.createObjectURL(photo.blob));
      }
      return photoUrlCache.get(key);
    }

    function getPatientPhotoUrl(patient) {
      if (!patient) return '';
      const photos = normalizeRecordPhotos(patient);
      if (photos.length === 0) return '';
      return getPhotoObjectUrl(patient.__backendId, photos[0]);
    }

    function renderPhotoGallery(record, patientId) {
      const photos = normalizeRecordPhotos(record);
      if (!photos.length) return '<p class="text-xs text-gray-400 py-3">Nenhuma imagem cadastrada.</p>';
      return `<div class="photo-grid">
        ${photos.map(photo => {
          const url = getPhotoObjectUrl(record.__backendId, photo);
          return `<div class="photo-tile">
            <img src="${url}" alt="Foto" onclick="window.open('${url}', '_blank')">
            <button type="button" onclick="deletePatientPhoto('${patientId}', '${photo.id}')" class="photo-delete">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>`;
        }).join('')}
      </div>`;
    }

    async function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(blob);
      });
    }

    async function preparePhotoBlob(file) {
      if (!file || !file.type || !file.type.startsWith('image/')) return null;
      // Se for muito grande, redimensiona
      if (file.size > 2 * 1024 * 1024) {
        const bitmap = await createImageBitmap(file);
        const maxSize = 1200;
        const scale = Math.min(1, maxSize / Math.max(bitmap.width, bitmap.height));
        const width = Math.max(1, Math.round(bitmap.width * scale));
        const height = Math.max(1, Math.round(bitmap.height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0, width, height);
        return new Promise((resolve) => {
          canvas.toBlob((blob) => resolve(blob || file), 'image/jpeg', 0.85);
        });
      }
      return file;
    }

    async function addPhotoToRecord(record, file) {
      const photoBlob = await preparePhotoBlob(file);
      if (!photoBlob) return record;
      const photos = normalizeRecordPhotos(record);
      photos.push({
        id: makeLocalId(),
        blob: photoBlob,
        name: file.name || `foto-${Date.now()}.jpg`,
        type: photoBlob.type || file.type || 'image/jpeg',
        size: photoBlob.size || file.size || 0,
        created_at: new Date().toISOString()
      });
      return { ...record, photos };
    }

    async function deletePhotoFromRecord(record, photoId) {
      const photos = normalizeRecordPhotos(record);
      const newPhotos = photos.filter(p => p.id !== photoId);
      // Limpar cache da URL removida
      for (const [key, url] of photoUrlCache.entries()) {
        if (key.includes(photoId)) {
          URL.revokeObjectURL(url);
          photoUrlCache.delete(key);
        }
      }
      return { ...record, photos: newPhotos };
    }

    // ==================== DATA SDK ====================
    async function refreshLocalData() {
      allData = await getAllLocalRecords();
      if (localDataHandler && typeof localDataHandler.onDataChanged === 'function') {
        localDataHandler.onDataChanged(allData);
      }
      updateLocalStatus();
    }

    function updateLocalStatus() {
      const status = document.getElementById('sync-status');
      if (!status) return;
      const patients = allData.filter(d => d.type === 'patient');
      const photos = patients.reduce((total, item) => total + countRecordPhotos(item), 0);
      status.innerHTML = `<i data-lucide="database" class="w-3 h-3"></i> Local • ${patients.length} pac. • ${photos} foto(s)`;
      if (window.lucide) lucide.createIcons();
    }

    function createLocalDataSdk() {
      return {
        init(handler) {
          localDataHandler = handler;
          refreshLocalData().catch(console.error);
        },
        async create(data) {
          try {
            const record = { ...data, __backendId: data.__backendId || makeLocalId(), created_at: data.created_at || new Date().toISOString(), updated_at: new Date().toISOString() };
            await putLocalRecord(record);
            await refreshLocalData();
            return { isOk: true, value: record };
          } catch (error) {
            console.error(error);
            return { isOk: false, error };
          }
        },
        async update(data) {
          try {
            const record = { ...data, __backendId: data.__backendId || makeLocalId(), updated_at: new Date().toISOString() };
            await putLocalRecord(record);
            await refreshLocalData();
            return { isOk: true, value: record };
          } catch (error) {
            console.error(error);
            return { isOk: false, error };
          }
        },
        async delete(record) {
          try {
            await deleteLocalRecord(record.__backendId);
            await refreshLocalData();
            return { isOk: true };
          } catch (error) {
            console.error(error);
            return { isOk: false, error };
          }
        }
      };
    }

    window.dataSdk = createLocalDataSdk();

    // ==================== HELPER FUNCTIONS ====================
    function getPatients() { return allData.filter(d => d.type === 'patient'); }
    function getVaccines() { return allData.filter(d => d.type === 'vaccine' && d.active !== false); }
    function getApplications() { return allData.filter(d => d.type === 'application'); }

    function calcAge(birthDate) {
      if (!birthDate) return '';
      const birth = new Date(birthDate);
      const now = new Date();
      let years = now.getFullYear() - birth.getFullYear();
      const months = now.getMonth() - birth.getMonth();
      if (months < 0) { years--; }
      if (years < 2) {
        const totalMonths = years * 12 + (months < 0 ? months + 12 : months);
        return totalMonths + (totalMonths === 1 ? ' mês' : ' meses');
      }
      return years + ' anos';
    }

    function isOverdue(app) {
      if (app.status === 'applied') return false;
      if (!app.next_dose_date) return false;
      const nextDate = new Date(app.next_dose_date);
      const today = new Date();
      nextDate.setHours(0,0,0,0);
      today.setHours(0,0,0,0);
      return today >= nextDate;
    }

    function showToast(msg, type = 'success') {
      const container = document.getElementById('toast-container');
      const div = document.createElement('div');
      const colors = { success: 'bg-emerald-600', error: 'bg-red-600', warning: 'bg-amber-600' };
      const icons = { success: 'check-circle', error: 'x-circle', warning: 'alert-triangle' };
      div.className = `toast ${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg text-sm flex items-center gap-2`;
      div.innerHTML = `<i data-lucide="${icons[type]}" class="w-4 h-4"></i>${msg}`;
      container.appendChild(div);
      if (window.lucide) lucide.createIcons();
      setTimeout(() => div.remove(), 3000);
    }

    function showModal(title, content, onClose) {
      const modal = document.getElementById('modal-container');
      modal.className = 'fixed inset-0 z-50 flex items-center justify-center modal-overlay';
      modal.innerHTML = `
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto fade-in">
          <div class="flex items-center justify-between p-4 border-b sticky top-0 bg-white z-10">
            <h3 class="font-bold text-gray-800">${title}</h3>
            <button onclick="closeModal()" class="p-1 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
          </div>
          <div class="p-4">${content}</div>
        </div>`;
      if (window.lucide) lucide.createIcons();
      window.modalOnClose = onClose;
    }

    function closeModal() {
      document.getElementById('modal-container').className = 'hidden fixed inset-0 z-50';
      if (window.modalOnClose) { window.modalOnClose(); window.modalOnClose = null; }
      tempPatientPhotos = [];
    }

    async function exportLocalBackup() {
      try {
        const records = await Promise.all(allData.map(async (item) => {
          const copy = { ...item };
          if (Array.isArray(copy.photos)) {
            copy.photos = await Promise.all(copy.photos.map(async (photo) => {
              const photoCopy = { ...photo };
              if (photoCopy.blob) {
                photoCopy.data_url = await blobToDataUrl(photoCopy.blob);
                delete photoCopy.blob;
              }
              return photoCopy;
            }));
          }
          return copy;
        }));
        const payload = { app: 'ACS Vacinas', exported_at: new Date().toISOString(), records };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `backup-acs-${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showToast('Backup local gerado!');
      } catch (error) { showToast('Erro ao gerar backup', 'error'); }
    }

    // ==================== NAVEGAÇÃO ====================
    function navigate(page) {
      currentPage = page;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const navEl = document.querySelector(`[data-nav="${page}"]`);
      if (navEl) navEl.classList.add('active');
      const titles = { dashboard: 'Dashboard', patients: 'Pacientes', 'register-vaccine': 'Registrar Vacina', vaccines: 'Cadastrar Vacina', alerts: 'Alertas', reports: 'Relatórios' };
      document.getElementById('page-title').textContent = titles[page] || '';
      renderCurrentPage();
    }

    function renderCurrentPage() {
      const container = document.getElementById('page-content');
      container.className = 'p-6 fade-in';
      const renderers = { dashboard: renderDashboard, patients: renderPatients, 'register-vaccine': renderRegisterVaccine, vaccines: renderVaccines, alerts: renderAlerts, reports: renderReports };
      (renderers[currentPage] || renderDashboard)(container);
      if (window.lucide) lucide.createIcons();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.add('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.add('hidden');
    }

    // ==================== DASHBOARD ====================
    function renderDashboard(el) {
      const patients = getPatients();
      const apps = getApplications();
      const overdueApps = apps.filter(isOverdue);
      const babies = patients.filter(p => p.category === 'Criança' && (new Date() - new Date(p.birth_date)) < 365*24*60*60*1000);
      const overdueCount = overdueApps.length;
      const coverage = apps.length ? Math.round((apps.filter(a=>a.status==='applied').length/apps.length)*100) : 0;
      const highRisk = patients.filter(p=>p.risk_level===3).length;
      const mediumRisk = patients.filter(p=>p.risk_level===2).length;
      el.innerHTML = `
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="stat-card bg-white p-4 rounded-xl shadow-sm" style="border-left-color:#ef4444;${overdueCount?'animation:pulse-alert 2s infinite':''}"><div class="flex justify-between"><div><p class="text-xs text-gray-500">Vacinas Atrasadas</p><p class="text-2xl font-bold text-red-600">${overdueCount}</p></div><div class="w-10 h-10 bg-red-50 rounded-lg flex items-center justify-center"><i data-lucide="alert-triangle" class="w-5 h-5 text-red-500"></i></div></div></div>
          <div class="stat-card bg-white p-4 rounded-xl shadow-sm" style="border-left-color:#10b981"><div class="flex justify-between"><div><p class="text-xs text-gray-500">Cobertura</p><p class="text-2xl font-bold text-emerald-600">${coverage}%</p></div><div class="w-10 h-10 bg-emerald-50 rounded-lg flex items-center justify-center"><i data-lucide="shield-check" class="w-5 h-5 text-emerald-500"></i></div></div></div>

          <div class="stat-card bg-white p-4 rounded-xl shadow-sm" style="border-left-color:#f59e0b"><div class="flex justify-between"><div><p class="text-xs text-gray-500">Crianças < 1 ano</p><p class="text-2xl font-bold text-amber-600">${babies.length}</p></div><div class="w-10 h-10 bg-amber-50 rounded-lg flex items-center justify-center"><i data-lucide="baby" class="w-5 h-5 text-amber-500"></i></div></div></div>

          <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500"><div class="flex justify-between"><div><p class="text-xs text-gray-500">Risco Alto</p><p class="text-2xl font-bold text-red-600">${highRisk}</p></div><div class="text-2xl">🔴</div></div></div>
          <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-amber-500"><div class="flex justify-between"><div><p class="text-xs text-gray-500">Risco Médio</p><p class="text-2xl font-bold text-amber-600">${mediumRisk}</p></div><div class="text-2xl">🟡</div></div></div>

    // ==================== PACIENTES ====================
    function renderPatients(el) {
      const patients = getPatients();
      el.innerHTML = `
        <div class="flex justify-between mb-4"><p class="text-sm text-gray-500">${patients.length} paciente(s)</p><button onclick="showPatientForm()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm flex gap-2"><i data-lucide="plus" class="w-4 h-4"></i>Novo Paciente</button></div>
        <div class="bg-white rounded-xl overflow-hidden">${patients.length===0?'<p class="p-6 text-gray-400 text-center">Nenhum paciente cadastrado.</p>':`<div class="divide-y">${patients.map(p=>{const riskColor=p.risk_level===1?'emerald':p.risk_level===2?'amber':'red';const riskIcon=p.risk_level===1?'🟢':p.risk_level===2?'🟡':'🔴';const photoUrl=getPatientPhotoUrl(p);return `<div class="p-4 flex justify-between items-center hover:bg-gray-50 cursor-pointer" onclick="showPatientDetails('${p.__backendId}')"><div class="flex items-center gap-3">${photoUrl?`<img src="${photoUrl}" class="patient-photo-thumb">`:`<div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center font-bold">${(p.name||'?')[0]}</div>`}<div><p class="font-medium">${p.name}</p><p class="text-xs text-gray-500">${p.category||'N/I'} • ${calcAge(p.birth_date)} • Micro ${p.microarea||'-'}</p><p class="text-xs text-emerald-600">${countRecordPhotos(p)} foto(s)</p></div></div><div class="flex gap-2"><span class="badge ${riskColor==='emerald'?'badge-green':riskColor==='amber'?'badge-yellow':'badge-red'}">${riskIcon} Risco</span><button onclick="event.stopPropagation(); editPatient('${p.__backendId}')" class="p-1 text-emerald-600"><i data-lucide="edit-2" class="w-4 h-4"></i></button><button onclick="event.stopPropagation(); deletePatientRecord('${p.__backendId}')" class="p-1 text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`}).join('')}</div>`}</div>`;
    }

    async function deletePatientPhoto(patientId, photoId) {
      const patient = allData.find(d => d.__backendId === patientId && d.type === 'patient');
      if (!patient) return;
      const updatedPatient = await deletePhotoFromRecord(patient, photoId);
      const result = await window.dataSdk.update(updatedPatient);
      if (result.isOk) { 
        showToast('Foto removida!'); 
        // Recarregar a edição para mostrar a galeria atualizada
        editPatient(patientId);
      } else showToast('Erro ao remover foto', 'error');
    }

    function showPatientForm(patient = null) {
      currentEditingPatient = patient;
      const isEditing = !!patient;
      const p = patient || {};
      if (!isEditing) tempPatientPhotos = [];
      const photosHtml = patient ? renderPhotoGallery(patient, patient.__backendId) : '<p class="text-xs text-gray-400">Nenhuma foto</p>';
      const tempPreview = (!isEditing && tempPatientPhotos.length) ? `<div class="mt-2"><p class="text-xs text-gray-600">Fotos selecionadas:</p><div class="flex flex-wrap gap-2">${tempPatientPhotos.map(f=>`<img src="${URL.createObjectURL(f)}" class="preview-img-thumb">`).join('')}</div></div>` : '';
      showModal(isEditing ? 'Editar Paciente' : 'Novo Paciente', `
        <form onsubmit="savePatientForm(event)" class="space-y-4 max-h-[70vh] overflow-y-auto">
          <div class="bg-blue-50 p-3 rounded text-xs text-blue-700">${isEditing ? 'Edite os campos e adicione/remova fotos.' : 'Preencha os dados e adicione fotos (opcional).'}</div>
          <div><label>Nome completo *</label><input name="name" value="${(p.name||'').replace(/"/g,'&quot;')}" required class="w-full border rounded px-3 py-2"></div>
          <div><label>Responsável/mãe</label><input name="responsible" value="${(p.responsible||'').replace(/"/g,'&quot;')}" class="w-full border rounded px-3 py-2"></div>
          <div class="border-t pt-3"><h4 class="font-bold text-sm">📋 Identificação</h4><div class="grid grid-cols-2 gap-3 mt-2"><div><label>Cartão SUS *</label><input name="sus_card" value="${p.sus_card||''}" required class="w-full border rounded px-3 py-2"></div><div><label>Data Nascimento *</label><input type="date" name="birth_date" value="${p.birth_date||''}" required class="w-full border rounded px-3 py-2"></div></div></div>
          <div class="border-t pt-3"><h4 class="font-bold text-sm">👥 Categoria</h4><select name="category" required class="w-full border rounded px-3 py-2 mt-2"><option value="">Selecione</option><option ${p.category==='Criança'?'selected':''}>Criança</option><option ${p.category==='Adolescente'?'selected':''}>Adolescente</option><option ${p.category==='Gestante'?'selected':''}>Gestante</option><option ${p.category==='Adulto'?'selected':''}>Adulto</option><option ${p.category==='Idoso'?'selected':''}>Idoso</option></select></div>
          <div class="border-t pt-3"><h4 class="font-bold text-sm">⚠️ Nível de Risco</h4><div class="space-y-2 mt-2"><label class="flex items-center gap-3 p-2 border rounded"><input type="radio" name="risk_level" value="1" ${p.risk_level===1||!p.risk_level?'checked':''}> 🟢 Baixo</label><label class="flex items-center gap-3 p-2 border rounded"><input type="radio" name="risk_level" value="2" ${p.risk_level===2?'checked':''}> 🟡 Médio</label><label class="flex items-center gap-3 p-2 border rounded"><input type="radio" name="risk_level" value="3" ${p.risk_level===3?'checked':''}> 🔴 Alto</label></div></div>
          <div class="border-t pt-3"><h4 class="font-bold text-sm">📞 Contato</h4><input name="phone" value="${p.phone||''}" placeholder="(11) 99999-9999" class="w-full border rounded px-3 py-2 mt-2"></div>
          <div class="border-t pt-3"><h4 class="font-bold text-sm">📍 Endereço</h4><input name="address" value="${(p.address||'').replace(/"/g,'&quot;')}" placeholder="Rua, número, bairro" class="w-full border rounded px-3 py-2 mt-2"><div class="mt-2"><label>Microárea</label><input name="microarea" value="${p.microarea||''}" placeholder="Ex: 01" class="w-full border rounded px-3 py-2"></div></div>
          <div class="border-t pt-3"><h4 class="font-bold text-sm">📸 Fotos</h4><div id="patient-photos-container" class="mb-3">${photosHtml}</div><div class="border rounded p-3 bg-gray-50"><label class="block text-xs mb-2">${isEditing ? 'Adicionar nova foto' : 'Selecionar fotos (múltiplas)'}</label><input type="file" id="new-patient-photo" accept="image/*" capture="environment" ${isEditing ? '' : 'multiple'} class="camera-input w-full" onchange="${isEditing ? 'addPatientPhotoFromInput(event, \'' + (p.__backendId||'') + '\')' : 'previewTempPatientPhotos(event)'}"></div>${tempPreview}</div>
          <input type="hidden" name="dum" value="${p.dum||''}">
          <div class="flex gap-2 pt-3"><button type="submit" class="flex-1 bg-emerald-600 text-white py-2 rounded flex items-center justify-center gap-2"><i data-lucide="check" class="w-4 h-4"></i>${isEditing ? 'Atualizar' : 'Salvar'}</button><button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded">Cancelar</button></div>
        </form>`, ()=>{ currentEditingPatient=null; tempPatientPhotos=[]; });
    }

    function previewTempPatientPhotos(event) {
      const files = Array.from(event.target.files);
      tempPatientPhotos.push(...files);
      const previewDiv = document.querySelector('#modal-container .p-4');
      if (previewDiv) {
        const oldPreview = previewDiv.querySelector('.temp-photos-preview');
        if (oldPreview) oldPreview.remove();
        const newPreview = document.createElement('div');
        newPreview.className = 'temp-photos-preview mt-2';
        newPreview.innerHTML = `<p class="text-xs text-gray-600">Fotos: ${tempPatientPhotos.length}</p><div class="flex flex-wrap gap-2">${tempPatientPhotos.map(f=>`<img src="${URL.createObjectURL(f)}" class="preview-img-thumb">`).join('')}</div>`;
        previewDiv.querySelector('#patient-photos-container')?.after(newPreview);
      }
    }

    async function addPatientPhotoFromInput(event, patientId) {
      const file = event.target.files[0];
      if (!file) return;
      const patient = allData.find(d => d.__backendId === patientId && d.type === 'patient');
      if (!patient) { showToast('Paciente não encontrado', 'error'); return; }
      const updated = await addPhotoToRecord(patient, file);
      const result = await window.dataSdk.update(updated);
      if (result.isOk) { 
        showToast('Foto adicionada!'); 
        // Recarregar a edição para mostrar a nova foto
        editPatient(patientId);
      } else showToast('Erro ao adicionar foto', 'error');
    }

    async function savePatientForm(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        type: 'patient',
        name: form.name.value,
        responsible: form.responsible.value,
        sus_card: form.sus_card.value,
        birth_date: form.birth_date.value,
        category: form.category.value,
        phone: form.phone.value,
        address: form.address.value,
        microarea: form.microarea.value,
        dum: form.dum?.value || '',
        risk_level: parseInt(form.risk_level.value) || 1,
        created_at: new Date().toISOString(),
        photos: []
      };
      let result;
      if (currentEditingPatient) {
        // Manter fotos existentes
        const existingPhotos = currentEditingPatient.photos || [];
        result = await window.dataSdk.update({ ...currentEditingPatient, ...data, photos: existingPhotos });
      } else {
        if (allData.length >= 999) { showToast('Limite atingido', 'error'); return; }
        for (const file of tempPatientPhotos) {
          const blob = await preparePhotoBlob(file);
          if (blob) data.photos.push({ id: makeLocalId(), blob: blob, name: file.name, type: blob.type, size: blob.size, created_at: new Date().toISOString() });
        }
        result = await window.dataSdk.create(data);
      }
      if (result.isOk) { 
        showToast(currentEditingPatient ? 'Paciente atualizado!' : 'Paciente salvo!'); 
        closeModal(); 
        currentEditingPatient = null; 
        tempPatientPhotos = [];
      } else showToast('Erro ao salvar', 'error');
    }

    function editPatient(backendId) {
      const patient = allData.find(d => d.__backendId === backendId && d.type === 'patient');
      if (patient) showPatientForm(patient);
    }

    async function deletePatientRecord(backendId) {
      const patient = allData.find(d => d.__backendId === backendId && d.type === 'patient');
      if (!patient) return;
      showModal('Confirmar Exclusão', `<p>Excluir <strong>${patient.name}</strong>? Todas as vacinas serão removidas.</p><div class="flex gap-2 mt-4"><button onclick="confirmDeletePatient('${backendId}')" class="flex-1 bg-red-600 text-white py-2 rounded">Excluir</button><button onclick="closeModal()" class="flex-1 bg-gray-200 py-2 rounded">Cancelar</button></div>`);
    }

    async function confirmDeletePatient(backendId) {
      const patient = allData.find(d => d.__backendId === backendId && d.type === 'patient');
      const relatedApps = allData.filter(d => d.type === 'application' && d.patient_id === patient.sus_card);
      for (const app of relatedApps) await window.dataSdk.delete(app);
      const result = await window.dataSdk.delete(patient);
      if (result.isOk) { showToast('Excluído!'); closeModal(); }
      else showToast('Erro', 'error');
    }

    function showPatientDetails(backendId) {
      const patient = allData.find(d => d.__backendId === backendId && d.type === 'patient');
      if (!patient) return;
      const apps = getApplications().filter(a => a.patient_id === patient.sus_card);
      const riskLabel = patient.risk_level === 1 ? 'Baixo' : patient.risk_level === 2 ? 'Médio' : 'Alto';
      const riskColor = patient.risk_level === 1 ? 'emerald' : patient.risk_level === 2 ? 'amber' : 'red';
      const photoUrl = getPatientPhotoUrl(patient);
      showModal('Detalhes do Paciente', `
        <div class="space-y-4"><div class="flex justify-between items-center"><div class="flex items-center gap-3">${photoUrl?`<img src="${photoUrl}" class="w-14 h-14 rounded-full object-cover border-2 border-emerald-500">`:`<div class="w-14 h-14 bg-emerald-100 rounded-full flex items-center justify-center text-xl font-bold">${(patient.name||'?')[0]}</div>`}<div><p class="font-bold text-lg">${patient.name}</p><p class="text-sm text-gray-500">${patient.category||'N/I'} • ${calcAge(patient.birth_date)}</p></div></div><button onclick="editPatient('${patient.__backendId}'); closeModal();" class="p-2 text-emerald-600"><i data-lucide="edit-2" class="w-5 h-5"></i></button></div>
        <div class="p-3 bg-${riskColor}-100 text-${riskColor}-700 rounded"><p class="text-sm font-bold">Risco ${riskLabel}</p></div>
        <div class="grid grid-cols-2 gap-3 text-sm"><div><span class="text-gray-500">SUS:</span> ${patient.sus_card}</div><div><span class="text-gray-500">Telefone:</span> ${patient.phone||'-'}</div><div class="col-span-2"><span class="text-gray-500">Endereço:</span> ${patient.address||'-'}</div><div><span class="text-gray-500">Microárea:</span> ${patient.microarea||'-'}</div>${patient.responsible?`<div class="col-span-2"><span class="text-gray-500">Responsável:</span> ${patient.responsible}</div>`:''}</div>
        <div><h4 class="font-bold">💉 Histórico Vacinal</h4>${apps.length===0?'<p class="text-gray-400 text-sm">Nenhum registro</p>':`<div class="space-y-2 max-h-64 overflow-y-auto">${apps.slice().reverse().map(a=>`<div class="flex justify-between p-3 bg-gray-50 rounded"><div><p class="font-medium">${a.vaccine_name}</p><p class="text-xs">${a.dose||''} • ${a.application_date}</p></div><span class="badge ${a.status==='applied'?'badge-green':isOverdue(a)?'badge-red':'badge-yellow'}">${a.status==='applied'?'Aplicada':isOverdue(a)?'Atrasada':'Agendada'}</span></div>`).join('')}</div>`}</div>
        <div><h4 class="font-bold">📸 Fotos</h4>${renderPhotoGallery(patient, patient.__backendId)}</div>
        <div class="mt-2"><button onclick="addPhotoFromDetails('${patient.__backendId}')" class="bg-emerald-600 text-white px-3 py-1 rounded text-sm">+ Adicionar foto</button></div>
      `);
    }

    // Função auxiliar para adicionar foto diretamente dos detalhes
    async function addPhotoFromDetails(patientId) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.capture = 'environment';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const patient = allData.find(d => d.__backendId === patientId && d.type === 'patient');
        if (!patient) return;
        const updated = await addPhotoToRecord(patient, file);
        const result = await window.dataSdk.update(updated);
        if (result.isOk) {
          showToast('Foto adicionada!');
          closeModal();
          showPatientDetails(patientId);
        } else showToast('Erro', 'error');
      };
      input.click();
    }

    // ==================== REGISTRAR VACINA ====================

    function previewVaccinePhoto(e) {
      const file = e.target.files[0];
      if (file) {
        vaccinePhotoFile = file;
        const reader = new FileReader();
        reader.onload = ev => { document.getElementById('vaccine-preview-img').src = ev.target.result; document.getElementById('vaccine-photo-preview').classList.remove('hidden'); };
        reader.readAsDataURL(file);
      }
    }
    function clearVaccinePhoto() { document.getElementById('vaccine-photo-input').value = ''; vaccinePhotoFile = null; document.getElementById('vaccine-photo-preview').classList.add('hidden'); }

    async function saveVaccineApplication(e) {
      e.preventDefault();
      const form = e.target;
      let data = { type: 'application', patient_id: form.patient_id.value, vaccine_name: form.vaccine_name.value, application_date: form.application_date.value, dose: form.dose.value, next_dose_date: form.next_dose_date.value, status: form.status.value, observations: form.observations.value, created_at: new Date().toISOString(), photos: [] };
      if (vaccinePhotoFile) {
        const blob = await preparePhotoBlob(vaccinePhotoFile);
        if (blob) data.photos = [{ id: makeLocalId(), blob, name: vaccinePhotoFile.name, type: blob.type, size: blob.size, created_at: new Date().toISOString() }];
      }
      const result = await window.dataSdk.create(data);
      if (result.isOk) {
        showToast('Vacina registrada!');
        form.reset();
        form.application_date.value = new Date().toISOString().split('T')[0];
        clearVaccinePhoto();
        const patient = getPatients().find(p => p.sus_card === form.patient_id.value);
        if (patient?.phone) setTimeout(() => showSendMessageForm(patient.phone, patient.name, form.vaccine_name.value), 500);
        renderCurrentPage(); // força recarregar a página para mostrar a nova vacina com foto
      } else showToast('Erro ao registrar', 'error');
    }

    async function updateVaccineStatus(e, backendId) {
      const record = allData.find(d => d.__backendId === backendId);
      if (!record) return;
      const updated = { ...record, status: e.target.value };
      const res = await window.dataSdk.update(updated);
      if (res.isOk) showToast('Status atualizado');
      else showToast('Erro', 'error');
    }

    async function editVaccineApplication(backendId) {
      const record = allData.find(d => d.__backendId === backendId);
      if (!record) return;
      currentEditingVaccine = record;
      const patients = getPatients();
      const vaccines = getVaccines();
      const patient = patients.find(p => p.sus_card === record.patient_id);
      showModal('Editar Aplicação', `<form onsubmit="updateVaccineApplication(event, '${backendId}')" class="space-y-4"><div class="grid md:grid-cols-2 gap-4"><div><label>Paciente</label><input type="text" value="${patient?.name||''}" disabled class="w-full border rounded px-3 py-2 bg-gray-100"></div><div><label>Vacina *</label><select name="vaccine_name" class="w-full border rounded px-3 py-2">${vaccines.map(v=>`<option ${record.vaccine_name===v.vaccine_name?'selected':''}>${v.vaccine_name}</option>`).join('')}</select></div></div><div class="grid md:grid-cols-3 gap-4"><div><label>Data *</label><input type="date" name="application_date" value="${record.application_date||''}" required class="w-full border rounded px-3 py-2"></div><div><label>Dose *</label><select name="dose" class="w-full border rounded px-3 py-2"><option ${record.dose==='1ª Dose'?'selected':''}>1ª Dose</option><option ${record.dose==='2ª Dose'?'selected':''}>2ª Dose</option><option ${record.dose==='3ª Dose'?'selected':''}>3ª Dose</option><option ${record.dose==='Reforço'?'selected':''}>Reforço</option><option ${record.dose==='Dose Única'?'selected':''}>Dose Única</option></select></div><div><label>Próxima Dose</label><input type="date" name="next_dose_date" value="${record.next_dose_date||''}" class="w-full border rounded px-3 py-2"></div></div><div><label>Status</label><select name="status" class="w-full border rounded px-3 py-2"><option ${record.status==='applied'?'selected':''}>applied</option><option ${record.status==='scheduled'?'selected':''}>scheduled</option></select></div><div><label>Observações</label><textarea name="observations" rows="2" class="w-full border rounded px-3 py-2">${record.observations||''}</textarea></div><button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded">Atualizar</button></form>`);
    }

    async function updateVaccineApplication(e, backendId) {
      e.preventDefault();
      const form = e.target;
      const existing = allData.find(d => d.__backendId === backendId);
      if (!existing) return;
      const updated = { ...existing, vaccine_name: form.vaccine_name.value, application_date: form.application_date.value, dose: form.dose.value, next_dose_date: form.next_dose_date.value, status: form.status.value, observations: form.observations.value, updated_at: new Date().toISOString() };
      const result = await window.dataSdk.update(updated);
      if (result.isOk) { showToast('Atualizado!'); closeModal(); currentEditingVaccine = null; }
      else showToast('Erro', 'error');
    }

    // ==================== VACINAS CATÁLOGO ====================
    function renderVaccines(el) {
      const vaccines = getVaccines();
      el.innerHTML = `<div class="flex justify-between mb-4"><p>${vaccines.length} vacina(s)</p><button onclick="showVaccineCatalogForm()" class="bg-emerald-600 text-white px-4 py-2 rounded">+ Nova Vacina</button></div><div class="grid md:grid-cols-3 gap-4">${vaccines.length===0?'<p class="col-span-full text-center text-gray-400">Nenhuma vacina cadastrada.</p>':vaccines.map(v=>`<div class="bg-white rounded-xl p-4 shadow-sm border-l-4 border-emerald-500"><div class="flex justify-between"><div><h4 class="font-bold">${v.vaccine_name}</h4><p class="text-xs text-gray-500">${v.dose||''} • ${v.age_range||''}</p>${v.description?`<p class="text-xs text-gray-400 mt-2">${v.description}</p>`:''}</div><button onclick="deleteCatalogVaccine('${v.__backendId}')" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div><div class="flex gap-2 mt-3">${v.interval_days?`<span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full">Intervalo: ${v.interval_days}d</span>`:''}${v.delay_days?`<span class="text-[10px] bg-amber-50 text-amber-600 px-2 py-0.5 rounded-full">Atraso: ${v.delay_days}d</span>`:''}</div></div>`).join('')}</div>`;
    }

    function showVaccineCatalogForm() {
      showModal('Cadastrar Vacina', `<form onsubmit="saveCatalogVaccine(event)" class="space-y-3"><div><label>Nome *</label><input name="vaccine_name" required class="w-full border rounded px-3 py-2"></div><div class="grid grid-cols-2 gap-3"><div><label>Dose</label><input name="dose" placeholder="Ex: 1ª Dose" class="w-full border rounded px-3 py-2"></div><div><label>Faixa Etária</label><input name="age_range" placeholder="Ex: 2 meses" class="w-full border rounded px-3 py-2"></div></div><div class="grid grid-cols-2 gap-3"><div><label>Intervalo (dias)</label><input type="number" name="interval_days" class="w-full border rounded px-3 py-2"></div><div><label>Atraso (dias)</label><input type="number" name="delay_days" class="w-full border rounded px-3 py-2"></div></div><div><label>Descrição</label><textarea name="description" rows="2" class="w-full border rounded px-3 py-2"></textarea></div><button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded">Salvar</button></form>`);
    }

    async function saveCatalogVaccine(e) {
      e.preventDefault();
      const form = e.target;
      const result = await window.dataSdk.create({ type: 'vaccine', vaccine_name: form.vaccine_name.value, dose: form.dose.value, age_range: form.age_range.value, interval_days: parseInt(form.interval_days.value)||0, delay_days: parseInt(form.delay_days.value)||0, description: form.description.value, active: true, created_at: new Date().toISOString() });
      if (result.isOk) { showToast('Vacina cadastrada!'); closeModal(); } else showToast('Erro', 'error');
    }

    async function deleteCatalogVaccine(id) {
      const record = allData.find(d => d.__backendId === id);
      if (record && (await window.dataSdk.delete(record)).isOk) showToast('Vacina excluída');
    }

    // ==================== ALERTAS ====================
    function renderAlerts(el) {
      const patients = getPatients();
      const apps = getApplications();
      const alerts = [];
      apps.filter(isOverdue).forEach(a=>{const p=patients.find(p=>p.sus_card===a.patient_id); alerts.push({icon:'alert-triangle',color:'red',msg:`${p?.name||'Paciente'}: ${a.vaccine_name} atrasada`,type:'Atrasada'});});
      apps.filter(a=>a.status!=='applied'&&a.next_dose_date).forEach(a=>{const diff=(new Date(a.next_dose_date)-new Date())/86400000;if(diff>=0&&diff<=7){const p=patients.find(p=>p.sus_card===a.patient_id); alerts.push({icon:'clock',color:'amber',msg:`${p?.name||'Paciente'}: ${a.vaccine_name} vence em ${Math.ceil(diff)} dia(s)`,type:'Próxima'});}});
      el.innerHTML = `<div class="bg-white rounded-xl p-5"><h3 class="font-bold mb-4 flex gap-2"><i data-lucide="bell" class="text-amber-500"></i>Alertas</h3>${alerts.length===0?'<p class="text-center text-gray-400 py-8">Nenhum alerta!</p>':`<div class="space-y-2">${alerts.map(a=>`<div class="flex items-center gap-3 p-3 ${a.color==='red'?'bg-red-50':'bg-amber-50'} rounded-lg"><i data-lucide="${a.icon}" class="w-4 h-4 ${a.color==='red'?'text-red-500':'text-amber-500'}"></i><div class="flex-1"><p class="text-sm">${a.msg}</p></div><span class="text-[10px] font-medium ${a.color==='red'?'bg-red-100 text-red-600':'bg-amber-100 text-amber-600'} px-2 py-0.5 rounded-full">${a.type}</span></div>`).join('')}</div>`}</div>`;
    }

    // ==================== RELATÓRIOS ====================
    function renderReports(el) {
      const patients = getPatients();
      const apps = getApplications();
      const appliedCount = apps.filter(a=>a.status==='applied').length;
      const overdueCount = apps.filter(isOverdue).length;
      const topVaccines = Object.entries(apps.reduce((acc,a)=>{acc[a.vaccine_name]=(acc[a.vaccine_name]||0)+1; return acc;},{})).sort((a,b)=>b[1]-a[1]).slice(0,5);
      el.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"><div class="bg-white p-5 rounded-xl text-center"><p class="text-2xl font-bold text-emerald-600">${patients.length}</p><p class="text-xs">Pacientes</p></div><div class="bg-white p-5 rounded-xl text-center"><p class="text-2xl font-bold text-blue-600">${apps.length}</p><p class="text-xs">Total Aplicações</p></div><div class="bg-white p-5 rounded-xl text-center"><p class="text-2xl font-bold text-emerald-600">${appliedCount}</p><p class="text-xs">Aplicadas</p></div><div class="bg-white p-5 rounded-xl text-center"><p class="text-2xl font-bold text-red-600">${overdueCount}</p><p class="text-xs">Atrasadas</p></div></div><div class="bg-white rounded-xl p-5"><h3 class="font-bold mb-3">🏆 Vacinas Mais Aplicadas</h3>${topVaccines.length===0?'<p class="text-gray-400">Nenhuma vacina aplicada</p>':`<div class="space-y-2">${topVaccines.map(([name,count])=>`<div class="flex justify-between p-2 bg-gray-50 rounded"><span>${name}</span><span class="font-bold text-emerald-600">${count}</span></div>`).join('')}</div>`}</div>`;
    }

    // ==================== MENSAGENS ====================
    function showSendMessageForm(phone, patientName, vaccineName) {
      if (!phone) { showToast('Paciente sem telefone', 'warning'); return; }
      showModal('Enviar Notificação', `<form onsubmit="sendMessage(event, '${phone.replace(/'/g,"\\'")}', '${patientName.replace(/'/g,"\\'")}', '${vaccineName.replace(/'/g,"\\'")}')" class="space-y-4"><div class="bg-blue-50 p-3 rounded"><p class="text-xs text-blue-700">Mensagem via WhatsApp Web</p></div><div><label>Destinatário</label><input type="text" value="${patientName} (${phone})" disabled class="w-full border rounded px-3 py-2 bg-gray-100"></div><div><label>Mensagem</label><textarea name="message" rows="4" class="w-full border rounded px-3 py-2">Olá ${patientName}, vacina ${vaccineName} está agendada. Compareça à UBS.</textarea></div><button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded flex items-center justify-center gap-2"><i data-lucide="send" class="w-4 h-4"></i> Enviar</button></form>`);
    }

    async function sendMessage(e, phone, patientName, vaccineName) {
      e.preventDefault();
      const message = e.target.message.value;
      const cleanPhone = phone.replace(/\D/g, '');
      window.open(`https://wa.me/55${cleanPhone}?text=${encodeURIComponent(message)}`, '_blank');
      showToast('Abrindo WhatsApp...');
      closeModal();
    }

    // ==================== INICIALIZAÇÃO ====================
    window.dataSdk.init({ onDataChanged(data) { allData = data; renderCurrentPage(); } });
    document.getElementById('global-search')?.addEventListener('input', function(e) {
      const q = e.target.value.toLowerCase();
      if (q.length >= 2) {
        const found = getPatients().filter(p => p.name?.toLowerCase().includes(q) || p.sus_card?.includes(q));
        if (found.length === 1) showPatientDetails(found[0].__backendId);
      }
    });
    document.getElementById('vaccine-photo-input')?.addEventListener('change', previewVaccinePhoto);
    
    // Expor globais
    window.navigate = navigate; window.toggleSidebar = toggleSidebar; window.closeSidebar = closeSidebar;
    window.showPatientForm = showPatientForm; window.savePatientForm = savePatientForm; window.editPatient = editPatient;
    window.deletePatientRecord = deletePatientRecord; window.confirmDeletePatient = confirmDeletePatient;
    window.deletePatientPhoto = deletePatientPhoto; window.showPatientDetails = showPatientDetails;
    window.addPatientPhotoFromInput = addPatientPhotoFromInput; window.previewTempPatientPhotos = previewTempPatientPhotos;
    window.saveVaccineApplication = saveVaccineApplication; window.updateVaccineStatus = updateVaccineStatus;
    window.editVaccineApplication = editVaccineApplication; window.updateVaccineApplication = updateVaccineApplication;
    window.previewVaccinePhoto = previewVaccinePhoto; window.clearVaccinePhoto = clearVaccinePhoto;
    window.showVaccineCatalogForm = showVaccineCatalogForm; window.saveCatalogVaccine = saveCatalogVaccine;
    window.deleteCatalogVaccine = deleteCatalogVaccine; window.showSendMessageForm = showSendMessageForm;
    window.sendMessage = sendMessage; window.closeModal = closeModal; window.exportLocalBackup = exportLocalBackup;
    window.addPhotoFromDetails = addPhotoFromDetails;
    
    renderCurrentPage();
    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
